<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atos2 — Live Worship Translation</title>
<meta name="description" content="Real-time worship translation, straight to each person's phone. Text and voice, in as many languages as your congregation needs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f8f4ea;--cream2:#f1ead9;--card:#ffffff;
  --gold:#c9a84c;--gold-d:#b8943a;--gold-l:#e8c97a;
  --ink:#2c2820;--muted:#8c8470;--line:#e7e0cf;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--ink);line-height:1.6;
  background:
    radial-gradient(ellipse 70% 50% at 50% -8%, rgba(201,168,76,.16), transparent 60%),
    radial-gradient(ellipse 55% 45% at 92% 12%, rgba(201,168,76,.08), transparent 60%),
    var(--cream);
  background-attachment:fixed;}
.wrap{max-width:1080px;margin:0 auto;padding:0 1.4rem}

.emblem{width:42px;height:42px;border-radius:50%;flex:none;
  background:linear-gradient(140deg,var(--gold-l),var(--gold),var(--gold-d));
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(201,168,76,.35)}
.emblem svg{width:20px;height:20px}
.wordmark{font-family:'Cinzel',serif;font-weight:600;font-size:1.25rem;letter-spacing:.06em;color:var(--ink);line-height:1}
.wordmark b{color:#000;font-weight:600}
.eyebrow{font-size:.6rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-d);margin-top:.2rem}

nav{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
  background:rgba(248,244,234,.82);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:.8rem 0;gap:1rem}
.brand{display:flex;align-items:center;gap:.7rem;text-decoration:none}
.nav-mid{display:flex;align-items:center;gap:1.4rem}
.nav-link{color:var(--ink);text-decoration:none;font-size:.9rem;font-weight:500;white-space:nowrap}
.nav-link:hover{color:var(--gold-d)}
.nav-right{display:flex;align-items:center;gap:.9rem}
.langsel{display:flex;gap:.2rem;background:var(--cream2);border-radius:9px;padding:3px}
.langsel button{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.04em;
  cursor:pointer;border:none;background:none;color:var(--muted);padding:.3rem .5rem;border-radius:7px;transition:.15s}
.langsel button.active{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(120,100,50,.15)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-family:'Inter',sans-serif;
  font-weight:600;font-size:.92rem;letter-spacing:.01em;border-radius:11px;padding:.8rem 1.4rem;cursor:pointer;
  text-decoration:none;transition:.15s;border:1.5px solid transparent}
.btn-primary{background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));color:#fff;box-shadow:0 4px 14px rgba(201,168,76,.32)}
.btn-primary:hover{filter:brightness(1.05)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--gold);background:#fcfaf4}
.btn-sm{padding:.55rem 1rem;font-size:.85rem}

.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:3rem;align-items:center;padding:4.2rem 0 3.6rem}
.hero .kicker{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:1.1rem}
.hero h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:clamp(2.3rem,5vw,3.5rem);line-height:1.08;color:var(--ink);letter-spacing:.01em}
.hero .lead{margin:1.4rem 0 2rem;font-size:1.05rem;color:#5f594b;max-width:30rem}
.hero-actions{display:flex;flex-wrap:wrap;gap:.8rem}
.trial-note{margin-top:1.1rem;font-size:.82rem;color:var(--muted)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 18px 50px rgba(120,100,50,.12),0 2px 8px rgba(120,100,50,.05);padding:1.5rem;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(201,168,76,.10),transparent 55%);pointer-events:none}
.panel-head{display:flex;align-items:center;gap:.55rem;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem;font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3f7d54;box-shadow:0 0 0 4px rgba(63,125,84,.15);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.spoken{background:var(--cream2);border-radius:12px;padding:.85rem 1rem;margin-bottom:.5rem}
.spoken .who{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:.25rem}
.spoken .ln{font-family:'Cormorant Garamond',serif;font-size:1.18rem;color:var(--ink)}
.flow{text-align:center;color:var(--muted);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin:.55rem 0 .65rem}
.langs{display:flex;flex-direction:column;gap:.5rem}
.lang{display:flex;align-items:center;gap:.7rem;background:#fcfaf4;border:1px solid var(--line);border-radius:11px;padding:.6rem .8rem;opacity:0;transform:translateY(6px);animation:rise .5s ease forwards}
.lang:nth-child(1){animation-delay:.15s}.lang:nth-child(2){animation-delay:.45s}.lang:nth-child(3){animation-delay:.75s}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.chip{flex:none;font-size:.62rem;font-weight:600;letter-spacing:.06em;color:var(--gold-d);background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:.25rem .45rem;min-width:34px;text-align:center}
.lang .tx{font-size:.92rem;color:var(--ink)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;padding:2.4rem 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat{text-align:center}
.stat .n{font-family:'Cinzel',serif;font-size:2rem;font-weight:600;color:var(--gold-d);line-height:1}
.stat .l{font-size:.8rem;color:var(--muted);margin-top:.5rem;display:block}

.section{padding:4rem 0}
.section-title{font-family:'Cinzel',serif;font-weight:600;font-size:1.6rem;color:var(--ink);text-align:center;margin-bottom:.6rem;letter-spacing:.02em}
.section-sub{text-align:center;color:var(--muted);max-width:34rem;margin:0 auto 2.6rem;font-size:.98rem}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:1.4rem}
.step{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.7rem 1.5rem;box-shadow:0 8px 26px rgba(120,100,50,.07)}
.step .num{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold-d);font-weight:600;letter-spacing:.1em;margin-bottom:.8rem}
.step h3{font-size:1.05rem;color:var(--ink);margin-bottom:.45rem;font-weight:600}
.step p{font-size:.9rem;color:#5f594b}

.features{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem 2.2rem;max-width:720px;margin:0 auto}
.feat{display:flex;gap:.7rem;align-items:flex-start}
.feat .tick{flex:none;width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.14);display:flex;align-items:center;justify-content:center;margin-top:.1rem}
.feat .tick svg{width:12px;height:12px}
.feat .ft{font-size:.94rem;color:var(--ink);font-weight:500}
.feat .fd{font-size:.84rem;color:var(--muted)}

.about{padding:4.4rem 0;border-top:1px solid var(--line)}
.about-in{max-width:680px;margin:0 auto;text-align:center}
.about .kicker{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:1.2rem}
.about .lema{font-family:'Cinzel',serif;font-size:clamp(1.7rem,4vw,2.4rem);color:var(--ink);letter-spacing:.04em;margin-bottom:.8rem}
.about .lema-line{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.25rem;color:var(--gold-d);margin-bottom:2.2rem}
.about .why{font-size:1.02rem;color:#5f594b;margin-bottom:2.4rem;text-align:left}
.about .name-intro{font-size:1.02rem;color:#5f594b;text-align:left;margin-bottom:1.4rem}
.about .verse{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.5rem;color:var(--ink);line-height:1.35}
.about .verse-ref{display:block;margin:.6rem 0 1.8rem;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d);font-weight:600}
.about .name-close{font-size:1.02rem;color:#5f594b;text-align:left}

.partner{padding:4rem 0;border-top:1px solid var(--line)}
.partner-in{max-width:720px;margin:0 auto;text-align:center}
.partner .kicker{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:1rem}
.partner h2{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--ink);margin-bottom:1rem;letter-spacing:.02em}
.partner .body{color:#5f594b;font-size:1.02rem;margin-bottom:2rem}
.partner .blist{display:flex;flex-direction:column;gap:.7rem;max-width:420px;margin:0 auto;text-align:left}
.partner .bitem{display:flex;gap:.7rem;align-items:center}
.partner .bitem .tick{flex:none;width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.14);display:flex;align-items:center;justify-content:center}
.partner .bitem .tick svg{width:12px;height:12px}
.partner .bitem span{font-size:.95rem;color:var(--ink)}

.proof{text-align:center;padding:3rem 0;border-top:1px solid var(--line)}
.proof .label{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.proof .name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--ink);letter-spacing:.02em}
.proof .city{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--gold-d);margin-top:.25rem}

.cta-band{background:linear-gradient(135deg,#fffdf7,#f6efdd);border:1px solid var(--line);border-radius:22px;text-align:center;padding:3.2rem 2rem;box-shadow:0 14px 40px rgba(120,100,50,.10);margin:2rem 0 4rem}
.cta-band h2{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--ink);margin-bottom:.6rem;letter-spacing:.02em}
.cta-band p{color:#5f594b;margin-bottom:1.8rem;max-width:30rem;margin-left:auto;margin-right:auto}
.cta-actions{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center}

footer{border-top:1px solid var(--line);padding:2.4rem 0;color:var(--muted);font-size:.86rem}
.foot-in{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.2rem}
.foot-tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--gold-d);max-width:24rem}
.foot-links{display:flex;gap:1.4rem;flex-wrap:wrap}
.foot-links a{color:var(--ink);text-decoration:none}
.foot-links a:hover{color:var(--gold-d)}

@media (max-width:820px){
  .hero{grid-template-columns:1fr;gap:2.4rem;padding:3rem 0 2.4rem}
  .panel{order:2}
  .stats{grid-template-columns:repeat(2,1fr);gap:1.8rem 1rem}
  .steps{grid-template-columns:1fr}
  .features{grid-template-columns:1fr;gap:.9rem}
  .nav-mid{display:none}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .lang{animation:none;opacity:1;transform:none}
  .live-dot{animation:none}
}
</style>
</head>
