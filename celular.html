<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atos2 · Live Translation</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230f0f17'/%3E%3Ctext%20x='16'%20y='24'%20font-family='Georgia,serif'%20font-weight='600'%20font-size='22'%20fill='%23e8c97a'%20text-anchor='middle'%3E2%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f4ea; --card: #ffffff;
    --gold: #c9a84c; --gold-d: #b8943a; --gold-l: #e8c97a;
    --ink: #2c2820; --muted: #8c8470; --line: #e7e0cf;
    --red: #c0392b; --green: #3f7d54;
    /* tamanho de fonte do feed (controlado pelos botões A/A/A) */
    --feed-scale: 1;
    /* tema do feed (claro por padrão; o modo escuro troca) */
    --feed-bg: #f8f4ea; --feed-ink: #2c2820; --feed-muted: #8c8470; --feed-card: #ffffff; --feed-line: #e7e0cf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--feed-bg); color: var(--feed-ink);
    font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
    transition: background 0.25s, color 0.25s;
  }
  #topbar {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem; background: var(--feed-card);
    border-bottom: 1px solid var(--feed-line);
    z-index: 10; transition: background 0.25s, border-color 0.25s;
  }
  .topbar-left { display: flex; align-items: center; gap: 0.55rem; }
  .emblem { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(140deg, var(--gold-l), var(--gold), var(--gold-d));
    display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 7px rgba(201,168,76,0.3); }
  .emblem svg { width: 15px; height: 15px; }
  .brand-col { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-mark { font-family: 'Cinzel', serif; font-size: 0.92rem; letter-spacing: 0.04em; color: var(--feed-ink); }
  .brand-mark b { color: var(--gold-d); font-weight: 600; }
  #room-label { color: var(--feed-muted); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
  #status { display: flex; align-items: center; gap: 0.4rem; color: var(--feed-muted); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--feed-muted); transition: background 0.3s; }
  #dot.on { background: var(--green); box-shadow: 0 0 8px rgba(63,125,84,0.5); }
  #dot.off { background: var(--red); }

  #listen-btn {
    background: none; border: 1px solid rgba(201,168,76,0.4); color: var(--gold-d);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.34rem 0.7rem; border-radius: 20px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  #listen-btn.on { background: rgba(201,168,76,0.16); border-color: var(--gold); color: var(--gold-d); }
  .icon-btn {
    background: none; border: 1px solid var(--feed-line); color: var(--feed-ink);
    width: 34px; height: 30px; border-radius: 9px; cursor: pointer; font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s;
  }
  .icon-btn:hover, .icon-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.12); }

  /* menu de controles (engrenagem) */
  #ctrl-menu {
    position: absolute; top: 3rem; right: 0.8rem; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 12px 36px rgba(120,100,50,0.18);
    padding: 0.9rem; display: none; flex-direction: column; gap: 0.7rem; z-index: 30; min-width: 230px;
  }
  #ctrl-menu.open { display: flex; }
  .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; }
  .ctrl-label { font-size: 0.74rem; font-weight: 600; color: var(--ink); }
  .seg { display: flex; gap: 0.3rem; }
  .seg button {
    border: 1px solid var(--line); background: #fcfaf4; color: var(--muted); border-radius: 8px;
    cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; padding: 0.3rem 0; width: 34px; transition: all 0.15s;
  }
  .seg button.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--ink); }
  .seg .a-s { font-size: 0.72rem; } .seg .a-m { font-size: 0.85rem; } .seg .a-l { font-size: 1rem; }
  .toggle-btn {
    border: 1px solid var(--line); background: #fcfaf4; color: var(--muted); border-radius: 8px;
    cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.7rem; transition: all 0.15s;
  }
  .toggle-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--ink); }
  .soon { font-size: 0.58rem; color: var(--muted); font-weight: 400; }

  #feed { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.6rem 1.2rem 2rem; }
  .line {
    font-family: 'Cormorant Garamond', serif;
    font-size: calc(1.7rem * var(--feed-scale));
    font-weight: 400; line-height: 1.45; color: var(--feed-ink);
    margin-bottom: 1.1rem; padding-left: 0.85rem; border-left: 2px solid rgba(201,168,76,0.5);
    animation: fade 0.4s ease-out; transition: font-size 0.2s, color 0.25s;
  }
  .line .ts { display: none; font-family: 'Inter', sans-serif; font-size: 0.6rem; letter-spacing: 0.06em;
    color: var(--feed-muted); text-transform: uppercase; margin-bottom: 0.2rem; }
  body.show-history .line .ts { display: block; }
  .line .orig { display: none; font-size: calc(1.05rem * var(--feed-scale)); font-style: italic; color: var(--feed-muted); margin-top: 0.25rem; }
  /* Caminho B: linha parcial (rascunho ao vivo, crescendo) */
  .line.partial { color: var(--feed-muted); border-left-color: rgba(201,168,76,0.28); opacity: 0.9; }
  .line.partial::after { content: '▌'; margin-left: 2px; color: var(--gold); animation: caret 1s steps(1) infinite; }
  .feed-notice {
    font-family: 'Inter', sans-serif; font-size: 0.72rem; line-height: 1.4; color: var(--gold-d);
    background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px; padding: 0.65rem 0.8rem; margin: 0 0 1rem;
  }
  @keyframes caret { 50% { opacity: 0; } }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .placeholder {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem;
    color: var(--feed-muted); text-align: center; margin-top: 30vh; padding: 0 1.5rem;
  }
  #live-btn {
    position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%) translateY(2rem);
    background: linear-gradient(135deg, var(--gold-d), var(--gold-l)); color: #fff;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em;
    padding: 0.6rem 1.4rem; border: none; border-radius: 30px; box-shadow: 0 4px 18px rgba(201,168,76,0.4);
    cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 20;
  }
  #live-btn.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

  /* ── MODO ESCURO do feed ── */
  body.dark { --feed-bg: #14130f; --feed-ink: #f0ead6; --feed-muted: #8c8470; --feed-card: #1b1a14; --feed-line: #2a2820; }

  /* ── Fio 4: barra de idioma + seletor (bottom sheet) ── */
  #lang-bar {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    padding: 0.6rem 1rem; background: var(--feed-card); color: var(--feed-ink);
    border: none; border-bottom: 1px solid var(--feed-line); cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 500;
    transition: background 0.25s, border-color 0.25s, color 0.25s;
  }
  #lang-bar .lb-left { display: flex; align-items: center; gap: 0.55rem; }
  #lang-bar svg { width: 16px; height: 16px; flex: none; stroke: var(--gold-d); }
  #lang-bar .lb-chev { stroke: var(--feed-muted); }
  #lang-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    display: none; align-items: flex-end;
  }
  #lang-overlay.open { display: flex; }
  .lang-sheet {
    background: var(--feed-card); width: 100%; max-height: 82vh; border-radius: 18px 18px 0 0;
    display: flex; flex-direction: column; padding: 1rem 1rem 1.4rem;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
  }
  .lang-sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    font-weight: 600; color: var(--feed-ink); margin-bottom: 0.8rem; font-size: 1rem;
  }
  #lang-close { background: none; border: none; font-size: 1.3rem; line-height: 1; color: var(--feed-muted); cursor: pointer; padding: 0.2rem 0.4rem; }
  #lang-search {
    width: 100%; padding: 0.7rem 0.9rem; border: 1px solid var(--feed-line); border-radius: 10px;
    background: var(--feed-bg); color: var(--feed-ink); font-family: 'Inter', sans-serif; font-size: 0.95rem; margin-bottom: 0.5rem;
  }
  #lang-list { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
  .lang-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 0.7rem; border-radius: 10px; cursor: pointer; color: var(--feed-ink); font-size: 1rem;
  }
  .lang-item:active, .lang-item.active { background: rgba(201,168,76,0.16); }
  .lang-item.active::after { content: "✓"; color: var(--gold-d); font-weight: 700; }
  /* mostrar original (bilíngue empilhado) */
  body.show-original .line .orig { display: block; }
  .listener-count { font-size: 0.62rem; font-weight: 600; color: var(--feed-muted); background: var(--feed-card); border: 1px solid var(--feed-line); border-radius: 20px; padding: 0.1rem 0.45rem; white-space: nowrap; }
  #room-label.is-church { text-transform: none; letter-spacing: normal; font-size: 0.72rem; font-weight: 600; color: var(--feed-ink); }
</style>

</head>
<body>
  <div id="topbar">
    <span class="topbar-left">
      <span class="emblem"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg></span>
      <span class="brand-col">
        <span class="brand-mark"><b>Atos</b>2</span>
        <span id="room-label">—</span>
      </span>
    </span>
    <span class="topbar-right">
      <span id="listener-count" class="listener-count" style="display:none">👥 0</span>
      <button id="listen-btn">🔊 Listen</button>
      <button class="icon-btn" id="gear-btn" title="Settings" data-i18n-attr="title:cel.settings">⚙</button>
      <span id="status"><span id="dot"></span><span id="status-text">Connecting…</span></span>
    </span>
  </div>

  <button id="lang-bar" type="button">
    <span class="lb-left">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 0 20 15.3 15.3 0 0 1 0-20z"/></svg>
      <span id="lang-bar-name" data-i18n="cel.language">Language</span>
    </span>
    <svg class="lb-chev" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <div id="ctrl-menu">
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="cel.text_size">Text size</span>
      <span class="seg" id="size-seg">
        <button class="a-s" data-size="small">A</button>
        <button class="a-m active" data-size="medium">A</button>
        <button class="a-l" data-size="large">A</button>
      </span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="cel.dark_mode">Dark mode</span>
      <button class="toggle-btn" id="dark-toggle" data-i18n="cel.off_label">Off</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="cel.history_time">History &amp; time</span>
      <button class="toggle-btn" id="history-toggle" data-i18n="cel.off_label">Off</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="cel.show_original">Show Original</span>
      <button class="toggle-btn" id="orig-toggle" data-i18n="cel.off_label">Off</button>
    </div>
  </div>

  <div id="feed">
    <div class="placeholder" id="placeholder" data-i18n="cel.waiting">Waiting for the live translation…</div>
  </div>

  <button id="live-btn">▼ <span data-i18n="cel.live">Live</span></button>

<div id="lang-overlay">
  <div class="lang-sheet">
    <div class="lang-sheet-head">
      <span data-i18n="cel.choose_language">Choose language</span>
      <button id="lang-close" type="button" aria-label="Close">✕</button>
    </div>
    <input id="lang-search" type="text" placeholder="Search language…" data-i18n-attr="placeholder:cel.search_language">
    <div id="lang-list"></div>
  </div>
</div>

<script src="i18n.js"></script>
<script>
  const WORKER_HOST = "traducao-culto-broadcast.leandrobisp-s.workers.dev";

  const params = new URLSearchParams(location.search);
  const sala = (params.get("sala") || "").trim().toUpperCase();
  let selectedLang = (params.get("lang") || "").trim().toLowerCase().split("-")[0]; // idioma escolhido ("" = padrão da sala)
  let effectiveLang = selectedLang; // idioma realmente recebido (do pacote) — o áudio segue ESTE
  let currentGender = 'male'; // received from operator via pkg
  const T = (k) => (window.Atos2I18N ? Atos2I18N.t(k) : k);

  const feed = document.getElementById("feed");
  const liveBtn = document.getElementById("live-btn");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const roomLabel = document.getElementById("room-label");

  // ══ CONTROLES DO OUVINTE (Fio 2) — tudo visual/local, não toca no motor ══
  const gearBtn = document.getElementById("gear-btn");
  const ctrlMenu = document.getElementById("ctrl-menu");
  gearBtn.addEventListener("click", (e) => { e.stopPropagation(); ctrlMenu.classList.toggle("open"); gearBtn.classList.toggle("active", ctrlMenu.classList.contains("open")); });
  document.addEventListener("click", (e) => { if (!ctrlMenu.contains(e.target) && e.target !== gearBtn) { ctrlMenu.classList.remove("open"); gearBtn.classList.remove("active"); } });

  // Tamanho de fonte (A/A/A)
  const SIZE_SCALE = { small: 0.8, medium: 1, large: 1.25 };
  document.getElementById("size-seg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    document.querySelectorAll("#size-seg button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    document.documentElement.style.setProperty("--feed-scale", SIZE_SCALE[b.dataset.size]);
  });

  // Modo escuro
  const darkToggle = document.getElementById("dark-toggle");
  darkToggle.addEventListener("click", () => {
    const on = document.body.classList.toggle("dark");
    darkToggle.classList.toggle("active", on);
    darkToggle.textContent = on ? T('cel.on_label') : T('cel.off_label');
  });

  // Histórico + horário
  const historyToggle = document.getElementById("history-toggle");
  historyToggle.addEventListener("click", () => {
    const on = document.body.classList.toggle("show-history");
    historyToggle.classList.toggle("active", on);
    historyToggle.textContent = on ? T('cel.on_label') : T('cel.off_label');
  });
  // ══ Fio 4 — Seletor de idioma de conteúdo + Show Original ══
  const LANGS = [

    {c:'kk', n:'\u049a\u0430\u0437\u0430\u049b', s:'kazakh kazajo qazaq'},
    {c:'uz', n:'O\u02bbzbek', s:'uzbek uzbeko ozbek'},
    {c:'tg', n:'\u0422\u043e\u04b7\u0438\u043a\u04e3', s:'tajik tayiko tojiki'},
    {c:'tk', n:'T\u00fcrkmen', s:'turkmen turkmeno'},
    {c:'ky', n:'\u041a\u044b\u0440\u0433\u044b\u0437', s:'kyrgyz kirguis kyrgyz'},
    {c:'mn', n:'\u041c\u043e\u043d\u0433\u043e\u043b', s:'mongolian mongol'},
    {c:'bn', n:'\u09ac\u09be\u0982\u09b2\u09be', s:'bengali bengali bangla'},
    {c:'pa', n:'\u0a2a\u0a70\u0a1c\u0a3e\u0a2c\u0a40', s:'punjabi penjabi panjabi'},
    {c:'gu', n:'\u0a97\u0ac1\u0a9c\u0ab0\u0abe\u0aa4\u0ac0', s:'gujarati gujarati'},
    {c:'ta', n:'\u0ba4\u0bae\u0bbf\u0bb4\u0bcd', s:'tamil tamil'},
    {c:'te', n:'\u0c24\u0c46\u0c32\u0c41\u0c17\u0c41', s:'telugu telugu'},
    {c:'kn', n:'\u0c95\u0ca8\u0ccd\u0ca8\u0ca1', s:'kannada canares kannada'},
    {c:'ml', n:'\u0d2e\u0d32\u0d2f\u0d3e\u0d33\u0d02', s:'malayalam malayalam'},
    {c:'mr', n:'\u092e\u0930\u093e\u0920\u0940', s:'marathi marathi'},
    {c:'ne', n:'\u0928\u0947\u092a\u093e\u0932\u0940', s:'nepali nepali'},
    {c:'si', n:'\u0dc3\u0dd2\u0d82\u0dc4\u0dbd', s:'sinhala cingales sinhala'},
    {c:'th', n:'\u0e44\u0e17\u0e22', s:'thai tailandes thai'},
    {c:'my', n:'\u1019\u103c\u1014\u103a\u1019\u102c', s:'burmese birmano myanmar'},
    {c:'km', n:'\u1781\u17d2\u1798\u17c2\u179a', s:'khmer jemer khmer'},
    {c:'lo', n:'\u0ea5\u0eb2\u0ea7', s:'lao laosiano lao'},
    {c:'ms', n:'Bahasa Melayu', s:'malay malayo melayu'},
    {c:'jv', n:'Basa Jawa', s:'javanese javanes jawa'},
    {c:'su', n:'Basa Sunda', s:'sundanese sundanes sunda'},
    {c:'sw', n:'Kiswahili', s:'swahili suajili kiswahili'},
    {c:'am', n:'\u12a0\u121b\u122d\u129b', s:'amharic amarico amharic'},
    {c:'ha', n:'Hausa', s:'hausa hausa'},
    {c:'yo', n:'Yor\u00f9b\u00e1', s:'yoruba yoruba'},
    {c:'ig', n:'Igbo', s:'igbo ibo'},
    {c:'zu', n:'isiZulu', s:'zulu zulu'},
    {c:'xh', n:'isiXhosa', s:'xhosa xhosa'},
    {c:'af', n:'Afrikaans', s:'afrikaans afrikaans'},
    {c:'st', n:'Sesotho', s:'sesotho sotho'},
    {c:'sn', n:'chiShona', s:'shona shona'},
    {c:'rw', n:'Kinyarwanda', s:'kinyarwanda ruandes'},
    {c:'so', n:'Soomaali', s:'somali somali'},
    {c:'mg', n:'Malagasy', s:'malagasy malgaxe'},
    {c:'ny', n:'Chichewa', s:'chichewa nyanja'},
    {c:'tn', n:'Setswana', s:'setswana tswana'},
    {c:'ht', n:'Krey\u00f2l Ayisyen', s:'haitian creole criollo haitiano kreyol'},
    {c:'qu', n:'Runa Simi', s:'quechua quechua runa simi'},
    {c:'gn', n:'Ava\u00f1e\u02bc\u1ebd', s:'guarani guarani ava\u00f1ee'},
  ];
  const langBar = document.getElementById('lang-bar');
  const langBarName = document.getElementById('lang-bar-name');
  const langOverlay = document.getElementById('lang-overlay');
  const langSearch = document.getElementById('lang-search');
  const langList = document.getElementById('lang-list');
  const langClose = document.getElementById('lang-close');

  function updateLangBar() {
    const code = selectedLang || effectiveLang || '';
    const L = LANGS.find(x => x.c === code);
    langBarName.textContent = L ? L.n : T('cel.language');
  }
  function buildLangList(filter) {
    const fq = (filter || '').trim().toLowerCase();
    const cur = selectedLang || effectiveLang || '';
    langList.innerHTML = '';
    LANGS.filter(L => !fq || L.n.toLowerCase().indexOf(fq) >= 0 || L.s.indexOf(fq) >= 0).forEach(L => {
      const item = document.createElement('div');
      item.className = 'lang-item' + (L.c === cur ? ' active' : '');
      const nm = document.createElement('span'); nm.className = 'endonym'; nm.textContent = L.n;
      item.appendChild(nm);
      item.addEventListener('click', () => selectLang(L.c));
      langList.appendChild(item);
    });
  }
  function openLangSheet() { buildLangList(''); langSearch.value = ''; langOverlay.classList.add('open'); setTimeout(() => { try { langSearch.focus(); } catch (e) {} }, 60); }
  function closeLangSheet() { langOverlay.classList.remove('open'); }
  function selectLang(code) {
    selectedLang = code;
    effectiveLang = code; // otimista; o pacote confirma o idioma recebido
    updateLangBar();
    closeLangSheet();
    // limpa o feed e mostra "aguardando" no novo idioma (linhas antigas eram de outro idioma)
    feed.innerHTML = '<div class="placeholder" id="placeholder">' + T('cel.waiting') + '</div>';
    following = true; liveBtn.classList.remove('show');
    // troca SEM reconectar se já conectado; senão o connect() já usa o novo idioma
    if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify({ setLang: code })); } catch (e) {} }
  }
  langBar.addEventListener('click', openLangSheet);
  langClose.addEventListener('click', closeLangSheet);
  langOverlay.addEventListener('click', (e) => { if (e.target === langOverlay) closeLangSheet(); });
  langSearch.addEventListener('input', () => buildLangList(langSearch.value));

  // Show Original (bilíngue empilhado): liga/desliga a exibição do texto original
  const origToggle = document.getElementById('orig-toggle');
  origToggle.addEventListener('click', () => {
    const on = document.body.classList.toggle('show-original');
    origToggle.classList.toggle('active', on);
    origToggle.textContent = on ? T('cel.on_label') : T('cel.off_label');
  });

  updateLangBar();


  let following = true;
  let ws = null;
  let reconnectTimer = null;

  // ── Áudio (voz neural sob demanda) — pede o MP3 ao Worker e toca no celular ──
  // Custo: só gera áudio quando alguém liga o "Listen". Ninguém ouvindo = custo zero.
  const TTS_HOST = "traducao-culto-api.leandrobisp-s.workers.dev";
  const SILENT_CLIP = "data:audio/wav;base64,UklGRvQHAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YdAHAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==";
  const listenBtn = document.getElementById("listen-btn");
  listenBtn.textContent = "🔊 " + T('cel.listen');
  const player = new Audio();
  let speakEnabled = false;
  let pendingTexts = [];   // linhas ainda não convertidas em áudio
  let readyAudios = [];    // áudios já prontos, esperando para tocar
  let fetching = false;
  let playing = false;
  let currentUrl = null;

  player.addEventListener("ended", onSegmentDone);
  player.addEventListener("error", onSegmentDone);

  function onSegmentDone() {
    if (currentUrl) { try { URL.revokeObjectURL(currentUrl); } catch (e) {} currentUrl = null; }
    playing = false;
    playNext();
    fetchAhead();
  }
  listenBtn.addEventListener("click", () => {
    speakEnabled = !speakEnabled;
    listenBtn.classList.toggle("on", speakEnabled);
    listenBtn.textContent = "🔊 " + (speakEnabled ? T('cel.on_label') : T('cel.listen'));
    if (speakEnabled) {
      // Desbloqueia o áudio no iOS tocando um silêncio dentro do toque do usuário.
      try { player.src = SILENT_CLIP; player.play().catch(() => {}); } catch (e) {}
    } else {
      stopSpeaking();
    }
  });

  // Enfileira uma linha para virar voz (só se o Listen estiver ligado).
  function enqueueSpeak(text) {
    if (!speakEnabled || !text) return;
    pendingTexts.push(text);
    fetchAhead();
  }

  // Busca o áudio da PRÓXIMA linha enquanto a atual ainda toca — é isso que mata a pausa entre frases.
  async function fetchAhead() {
    if (!speakEnabled || fetching) return;
    if (pendingTexts.length === 0) return;
    if (readyAudios.length >= 2) return; // basta manter DUAS linha adiantada e pronta
    fetching = true;
    const text = pendingTexts.shift();
    try {
      const res = await fetch("https://" + TTS_HOST + "/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, lang: effectiveLang, gender: currentGender }),
      });
      if (!speakEnabled) { fetching = false; return; }
      if (res.ok) {
        const blob = await res.blob();
        if (!speakEnabled) { fetching = false; return; }
        readyAudios.push(URL.createObjectURL(blob)); // guarda a linha PRIMEIRO, na ordem
        fetching = false;                            // só agora libera a próxima busca
        playNext();
        fetchAhead();
      } else {
        fetching = false;
        fetchAhead(); // pula linha com erro e tenta a próxima
      }
    } catch (e) {
      fetching = false;
      fetchAhead();
    }
  }

  // Toca a próxima linha já pronta; ao terminar, a seguinte normalmente já está pronta (sem espera).
  function playNext() {
    if (!speakEnabled || playing || readyAudios.length === 0) return;
    playing = true;
    currentUrl = readyAudios.shift();
    player.src = currentUrl;
    player.play().catch(() => { playing = false; onSegmentDone(); });
    fetchAhead();
  }

  // Parar = parar de pedir: limpa tudo e silencia na hora.
  function stopSpeaking() {
    pendingTexts = [];
    readyAudios.forEach(u => { try { URL.revokeObjectURL(u); } catch (e) {} });
    readyAudios = [];
    fetching = false;
    playing = false;
    try { player.pause(); } catch (e) {}
    if (currentUrl) { try { URL.revokeObjectURL(currentUrl); } catch (e) {} currentUrl = null; }
  }

  roomLabel.textContent = sala ? "" : T('cel.no_room');

  if (!sala) {
    document.getElementById("placeholder").textContent = T('cel.invalid_link');
    statusText.textContent = T('cel.no_room');
  } else {
    connect();
  }

  function setStatus(state, text) {
    dot.className = state;
    statusText.textContent = text;
  }

  function atBottom() {
    return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  }
  function scrollToBottom(smooth) {
    feed.scrollTo({ top: feed.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  }

  // Detecta se a pessoa rolou para cima (para parar de empurrar) ou voltou ao fim (para retomar).
  feed.addEventListener("scroll", () => {
    if (atBottom()) {
      following = true;
      liveBtn.classList.remove("show");
    } else {
      following = false;
      liveBtn.classList.add("show");
    }
  });

  liveBtn.addEventListener("click", () => {
    following = true;
    liveBtn.classList.remove("show");
    scrollToBottom(true);
  });

  // Recebe a mensagem do transmissor: pacote do Fio 4 OU texto simples (avulso/antigo).
  function handleIncoming(raw) {
    let pkg = null;
    if (typeof raw === "string" && raw.charAt(0) === "{") {
      try { const o = JSON.parse(raw); if (o && typeof o.t === "string") pkg = o; } catch (e) {}
    }
    if (pkg) handlePackage(pkg);
    else addLine(raw, null); // texto simples: mostra como hoje
  }
  function setChurch(name) {
    if (!name) return;
    roomLabel.textContent = name;
    roomLabel.classList.add('is-church');
  }
  function setCount(n) {
    const el = document.getElementById('listener-count');
    if (!el) return;
    el.textContent = '👥 ' + n;
    el.style.display = '';
  }
  // Caminho B: estado dos dois níveis (confirmado + parcial)
  let partialState = { id: null, revision: -1 };
  let lastFinalId = null;

  function handlePackage(pkg) {
    if (pkg.church) setChurch(pkg.church);
    if (pkg.gender) currentGender = pkg.gender;
    if (typeof pkg.count === 'number') setCount(pkg.count);
    if (pkg.unavailable) { // idioma escolhido ainda não foi ativado pelo operador
      clearPartial();
      partialState = { id: null, revision: -1 };
      showFeedNotice(T('cel.lang_unavailable'));
      return;
    }
    clearFeedNotice();
    if (pkg.lang) {
      effectiveLang = pkg.lang;             // o áudio segue o idioma realmente recebido
      if (!selectedLang) updateLangBar();   // modo padrão: a barra mostra o idioma padrão da sala
    }
    const kind = pkg.kind || 'final';
    const id = pkg.id || '';
    const rev = (typeof pkg.revision === 'number') ? pkg.revision : 0;
    if (kind === 'partial') handlePartial(id, rev, pkg.t);
    else handleFinal(id, pkg.t, pkg.o || null);
  }

  // PARCIAL: rascunho ao vivo, atualizado no lugar (não fala, não vira histórico ainda)
  function handlePartial(id, rev, t) {
    if (!t) return;
    if (id && id === lastFinalId) return;                 // pensamento já confirmado: ignora parcial atrasada
    if (id !== partialState.id) partialState = { id: id, revision: -1 }; // novo pensamento
    if (rev <= partialState.revision) return;             // parcial mais antiga: ignora
    partialState.revision = rev;
    renderPartial(t);
    if (following) scrollToBottom(false); else liveBtn.classList.add('show');
  }

  // FINAL: alta qualidade -> confirma (linha firme), fala (TTS) e remove a parcial deste pensamento
  function handleFinal(id, t, o) {
    if (!t) return;
    if (id && partialState.id === id) clearPartial();     // só limpa a parcial DESTE pensamento
    if (id) lastFinalId = id;
    if (partialState.id === id) partialState = { id: null, revision: -1 };
    addLine(t, o);
  }

  function renderPartial(t) {
    const ph = document.getElementById('placeholder'); if (ph) ph.remove();
    let div = document.getElementById('partial-line');
    if (!div) {
      div = document.createElement('div');
      div.className = 'line partial';
      div.id = 'partial-line';
      feed.appendChild(div);
    }
    div.textContent = t;
  }

  function clearPartial() {
    const div = document.getElementById('partial-line');
    if (div) div.remove();
  }

  function hasConfirmedLines() {
    return !!feed.querySelector('.line:not(.partial)');
  }

  function showFeedNotice(text) {
    if (!hasConfirmedLines()) {
      feed.innerHTML = '<div class="placeholder" id="placeholder">' + text + '</div>';
      return;
    }
    const ph = document.getElementById('placeholder');
    if (ph) ph.remove();
    let notice = document.getElementById('feed-notice');
    if (!notice) {
      notice = document.createElement('div');
      notice.className = 'feed-notice';
      notice.id = 'feed-notice';
      feed.appendChild(notice);
    }
    notice.textContent = text;
    if (following) scrollToBottom(false); else liveBtn.classList.add('show');
  }

  function clearFeedNotice() {
    const notice = document.getElementById('feed-notice');
    if (notice) notice.remove();
  }

  function addLine(t, o) {
    if (!t) return;
    clearFeedNotice();
    const ph = document.getElementById("placeholder");
    if (ph) ph.remove();

    const div = document.createElement("div");
    div.className = "line";
    const ts = document.createElement("div");
    ts.className = "ts";
    ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const body = document.createElement("div");
    body.textContent = t;
    div.appendChild(ts);
    div.appendChild(body);
    if (o) {
      const orig = document.createElement("div");
      orig.className = "orig";
      orig.textContent = o;
      div.appendChild(orig);
    }
    const partialDiv = document.getElementById('partial-line');
    if (partialDiv) feed.insertBefore(div, partialDiv); // confirmadas ficam ACIMA da parcial em andamento
    else feed.appendChild(div);

    enqueueSpeak(t);

    // Só acompanha automaticamente se a pessoa estiver lendo ao vivo (no fim).
    if (following) {
      scrollToBottom(false);
    } else {
      liveBtn.classList.add("show");
    }
  }

  function connect() {
    setStatus("", T('cel.connecting'));
    ws = new WebSocket("wss://" + WORKER_HOST + "/ws?sala=" + encodeURIComponent(sala) + (selectedLang ? "&lang=" + encodeURIComponent(selectedLang) : ""));

    ws.onopen = () => setStatus("on", T('cel.live'));
    ws.onmessage = (e) => handleIncoming(e.data);
    ws.onclose = () => {
      setStatus("off", T('cel.reconnecting'));
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => { try { ws.close(); } catch {} };
  }
</script>
