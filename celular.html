<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atos2 · Live Translation</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230f0f17'/%3E%3Ctext%20x='16'%20y='24'%20font-family='Georgia,serif'%20font-weight='600'%20font-size='22'%20fill='%23e8c97a'%20text-anchor='middle'%3E2%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f4ea; --card: #ffffff;
    --gold: #c9a84c; --gold-d: #b8943a; --gold-l: #e8c97a;
    --ink: #2c2820; --muted: #8c8470; --line: #e7e0cf;
    --red: #c0392b; --green: #3f7d54;
    /* tamanho de fonte do feed (controlado pelos botões A/A/A) */
    --feed-scale: 1;
    /* tema do feed (claro por padrão; o modo escuro troca) */
    --feed-bg: #f8f4ea; --feed-ink: #2c2820; --feed-muted: #8c8470; --feed-card: #ffffff; --feed-line: #e7e0cf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--feed-bg); color: var(--feed-ink);
    font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
    transition: background 0.25s, color 0.25s;
  }
  #topbar {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem; background: var(--feed-card);
    border-bottom: 1px solid var(--feed-line);
    z-index: 10; transition: background 0.25s, border-color 0.25s;
  }
  .topbar-left { display: flex; align-items: center; gap: 0.55rem; }
  .emblem { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(140deg, var(--gold-l), var(--gold), var(--gold-d));
    display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 7px rgba(201,168,76,0.3); }
  .emblem svg { width: 15px; height: 15px; }
  .brand-col { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-mark { font-family: 'Cinzel', serif; font-size: 0.92rem; letter-spacing: 0.04em; color: var(--feed-ink); }
  .brand-mark b { color: var(--gold-d); font-weight: 600; }
  #room-label { color: var(--feed-muted); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
  #status { display: flex; align-items: center; gap: 0.4rem; color: var(--feed-muted); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--feed-muted); transition: background 0.3s; }
  #dot.on { background: var(--green); box-shadow: 0 0 8px rgba(63,125,84,0.5); }
  #dot.off { background: var(--red); }

  #listen-btn {
    background: none; border: 1px solid rgba(201,168,76,0.4); color: var(--gold-d);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.34rem 0.7rem; border-radius: 20px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  #listen-btn.on { background: rgba(201,168,76,0.16); border-color: var(--gold); color: var(--gold-d); }
  .icon-btn {
    background: none; border: 1px solid var(--feed-line); color: var(--feed-ink);
    width: 34px; height: 30px; border-radius: 9px; cursor: pointer; font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s;
  }
  .icon-btn:hover, .icon-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.12); }

  /* menu de controles (engrenagem) */
  #ctrl-menu {
    position: absolute; top: 3rem; right: 0.8rem; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 12px 36px rgba(120,100,50,0.18);
    padding: 0.9rem; display: none; flex-direction: column; gap: 0.7rem; z-index: 30; min-width: 230px;
  }
  #ctrl-menu.open { display: flex; }
  .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; }
  .ctrl-label { font-size: 0.74rem; font-weight: 600; color: var(--ink); }
  .seg { display: flex; gap: 0.3rem; }
  .seg button {
    border: 1px solid var(--line); background: #fcfaf4; color: var(--muted); border-radius: 8px;
    cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; padding: 0.3rem 0; width: 34px; transition: all 0.15s;
  }
  .seg button.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--ink); }
  .seg .a-s { font-size: 0.72rem; } .seg .a-m { font-size: 0.85rem; } .seg .a-l { font-size: 1rem; }
  .toggle-btn {
    border: 1px solid var(--line); background: #fcfaf4; color: var(--muted); border-radius: 8px;
    cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.7rem; transition: all 0.15s;
  }
  .toggle-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--ink); }
  .soon { font-size: 0.58rem; color: var(--muted); font-weight: 400; }

  #feed { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.6rem 1.2rem 2rem; }
  .line {
    font-family: 'Cormorant Garamond', serif;
    font-size: calc(1.7rem * var(--feed-scale));
    font-weight: 400; line-height: 1.45; color: var(--feed-ink);
    margin-bottom: 1.1rem; padding-left: 0.85rem; border-left: 2px solid rgba(201,168,76,0.5);
    animation: fade 0.4s ease-out; transition: font-size 0.2s, color 0.25s;
  }
  .line .ts { display: none; font-family: 'Inter', sans-serif; font-size: 0.6rem; letter-spacing: 0.06em;
    color: var(--feed-muted); text-transform: uppercase; margin-bottom: 0.2rem; }
  body.show-history .line .ts { display: block; }
  .line .orig { display: none; font-size: calc(1.05rem * var(--feed-scale)); font-style: italic; color: var(--feed-muted); margin-top: 0.25rem; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .placeholder {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem;
    color: var(--feed-muted); text-align: center; margin-top: 30vh; padding: 0 1.5rem;
  }
  #live-btn {
    position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%) translateY(2rem);
    background: linear-gradient(135deg, var(--gold-d), var(--gold-l)); color: #fff;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em;
    padding: 0.6rem 1.4rem; border: none; border-radius: 30px; box-shadow: 0 4px 18px rgba(201,168,76,0.4);
    cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 20;
  }
  #live-btn.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

  /* ── MODO ESCURO do feed ── */
  body.dark { --feed-bg: #14130f; --feed-ink: #f0ead6; --feed-muted: #8c8470; --feed-card: #1b1a14; --feed-line: #2a2820; }
</style>

</head>
<body>
  <div id="topbar">
    <span class="topbar-left">
      <span class="emblem"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg></span>
      <span class="brand-col">
        <span class="brand-mark"><b>Atos</b>2</span>
        <span id="room-label">—</span>
      </span>
    </span>
    <span class="topbar-right">
      <button id="listen-btn">🔊 Listen</button>
      <button class="icon-btn" id="gear-btn" title="Settings">⚙</button>
      <span id="status"><span id="dot"></span><span id="status-text">Connecting…</span></span>
    </span>
  </div>

  <div id="ctrl-menu">
    <div class="ctrl-row">
      <span class="ctrl-label">Text size</span>
      <span class="seg" id="size-seg">
        <button class="a-s" data-size="small">A</button>
        <button class="a-m active" data-size="medium">A</button>
        <button class="a-l" data-size="large">A</button>
      </span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Dark mode</span>
      <button class="toggle-btn" id="dark-toggle">Off</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">History &amp; time</span>
      <button class="toggle-btn" id="history-toggle">Off</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Show Original <span class="soon">soon</span></span>
      <button class="toggle-btn" id="orig-toggle" disabled style="opacity:0.5;cursor:default">Soon</button>
    </div>
  </div>

  <div id="feed">
    <div class="placeholder" id="placeholder">Waiting for the live translation…</div>
  </div>

  <button id="live-btn">▼ Live</button>

<script>
  const WORKER_HOST = "traducao-culto-broadcast.leandrobisp-s.workers.dev";

  const params = new URLSearchParams(location.search);
  const sala = (params.get("sala") || "").trim().toUpperCase();
  const lang = (params.get("lang") || "").trim().toLowerCase();

  const feed = document.getElementById("feed");
  const liveBtn = document.getElementById("live-btn");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const roomLabel = document.getElementById("room-label");

  // ══ CONTROLES DO OUVINTE (Fio 2) — tudo visual/local, não toca no motor ══
  const gearBtn = document.getElementById("gear-btn");
  const ctrlMenu = document.getElementById("ctrl-menu");
  gearBtn.addEventListener("click", (e) => { e.stopPropagation(); ctrlMenu.classList.toggle("open"); gearBtn.classList.toggle("active", ctrlMenu.classList.contains("open")); });
  document.addEventListener("click", (e) => { if (!ctrlMenu.contains(e.target) && e.target !== gearBtn) { ctrlMenu.classList.remove("open"); gearBtn.classList.remove("active"); } });

  // Tamanho de fonte (A/A/A)
  const SIZE_SCALE = { small: 0.8, medium: 1, large: 1.25 };
  document.getElementById("size-seg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    document.querySelectorAll("#size-seg button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    document.documentElement.style.setProperty("--feed-scale", SIZE_SCALE[b.dataset.size]);
  });

  // Modo escuro
  const darkToggle = document.getElementById("dark-toggle");
  darkToggle.addEventListener("click", () => {
    const on = document.body.classList.toggle("dark");
    darkToggle.classList.toggle("active", on);
    darkToggle.textContent = on ? "On" : "Off";
  });

  // Histórico + horário
  const historyToggle = document.getElementById("history-toggle");
  historyToggle.addEventListener("click", () => {
    const on = document.body.classList.toggle("show-history");
    historyToggle.classList.toggle("active", on);
    historyToggle.textContent = on ? "On" : "Off";
  });
  // "Show Original" fica preparado mas desativado (chega no Fio 3, junto do seletor de idiomas).


  let following = true;
  let ws = null;
  let reconnectTimer = null;

  // ── Áudio (voz neural sob demanda) — pede o MP3 ao Worker e toca no celular ──
  // Custo: só gera áudio quando alguém liga o "Listen". Ninguém ouvindo = custo zero.
  const TTS_HOST = "traducao-culto-api.leandrobisp-s.workers.dev";
  const SILENT_CLIP = "data:audio/wav;base64,UklGRvQHAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YdAHAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==";
  const listenBtn = document.getElementById("listen-btn");
  const player = new Audio();
  let speakEnabled = false;
  let pendingTexts = [];   // linhas ainda não convertidas em áudio
  let readyAudios = [];    // áudios já prontos, esperando para tocar
  let fetching = false;
  let playing = false;
  let currentUrl = null;

  player.addEventListener("ended", onSegmentDone);
  player.addEventListener("error", onSegmentDone);

  function onSegmentDone() {
    if (currentUrl) { try { URL.revokeObjectURL(currentUrl); } catch (e) {} currentUrl = null; }
    playing = false;
    playNext();
    fetchAhead();
  }
  listenBtn.addEventListener("click", () => {
    speakEnabled = !speakEnabled;
    listenBtn.classList.toggle("on", speakEnabled);
    listenBtn.textContent = speakEnabled ? "🔊 On" : "🔊 Listen";
    if (speakEnabled) {
      // Desbloqueia o áudio no iOS tocando um silêncio dentro do toque do usuário.
      try { player.src = SILENT_CLIP; player.play().catch(() => {}); } catch (e) {}
    } else {
      stopSpeaking();
    }
  });

  // Enfileira uma linha para virar voz (só se o Listen estiver ligado).
  function enqueueSpeak(text) {
    if (!speakEnabled || !text) return;
    pendingTexts.push(text);
    fetchAhead();
  }

  // Busca o áudio da PRÓXIMA linha enquanto a atual ainda toca — é isso que mata a pausa entre frases.
  async function fetchAhead() {
    if (!speakEnabled || fetching) return;
    if (pendingTexts.length === 0) return;
    if (readyAudios.length >= 2) return; // basta manter DUAS linha adiantada e pronta
    fetching = true;
    const text = pendingTexts.shift();
    try {
      const res = await fetch("https://" + TTS_HOST + "/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, lang }),
      });
      if (!speakEnabled) { fetching = false; return; }
      if (res.ok) {
        const blob = await res.blob();
        if (!speakEnabled) { fetching = false; return; }
        readyAudios.push(URL.createObjectURL(blob)); // guarda a linha PRIMEIRO, na ordem
        fetching = false;                            // só agora libera a próxima busca
        playNext();
        fetchAhead();
      } else {
        fetching = false;
        fetchAhead(); // pula linha com erro e tenta a próxima
      }
    } catch (e) {
      fetching = false;
      fetchAhead();
    }
  }

  // Toca a próxima linha já pronta; ao terminar, a seguinte normalmente já está pronta (sem espera).
  function playNext() {
    if (!speakEnabled || playing || readyAudios.length === 0) return;
    playing = true;
    currentUrl = readyAudios.shift();
    player.src = currentUrl;
    player.play().catch(() => { playing = false; onSegmentDone(); });
    fetchAhead();
  }

  // Parar = parar de pedir: limpa tudo e silencia na hora.
  function stopSpeaking() {
    pendingTexts = [];
    readyAudios.forEach(u => { try { URL.revokeObjectURL(u); } catch (e) {} });
    readyAudios = [];
    fetching = false;
    playing = false;
    try { player.pause(); } catch (e) {}
    if (currentUrl) { try { URL.revokeObjectURL(currentUrl); } catch (e) {} currentUrl = null; }
  }

  roomLabel.textContent = sala ? ("Room " + sala) : "No room";

  if (!sala) {
    document.getElementById("placeholder").textContent = "Invalid link: no room found.";
    statusText.textContent = "No room";
  } else {
    connect();
  }

  function setStatus(state, text) {
    dot.className = state;
    statusText.textContent = text;
  }

  function atBottom() {
    return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  }
  function scrollToBottom(smooth) {
    feed.scrollTo({ top: feed.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  }

  // Detecta se a pessoa rolou para cima (para parar de empurrar) ou voltou ao fim (para retomar).
  feed.addEventListener("scroll", () => {
    if (atBottom()) {
      following = true;
      liveBtn.classList.remove("show");
    } else {
      following = false;
      liveBtn.classList.add("show");
    }
  });

  liveBtn.addEventListener("click", () => {
    following = true;
    liveBtn.classList.remove("show");
    scrollToBottom(true);
  });

  function addLine(text) {
    if (!text) return;
    const ph = document.getElementById("placeholder");
    if (ph) ph.remove();

    const div = document.createElement("div");
    div.className = "line";
    const ts = document.createElement("div");
    ts.className = "ts";
    ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const body = document.createElement("div");
    body.textContent = text;
    div.appendChild(ts);
    div.appendChild(body);
    feed.appendChild(div);

    enqueueSpeak(text);

    // Só acompanha automaticamente se a pessoa estiver lendo ao vivo (no fim).
    if (following) {
      scrollToBottom(false);
    } else {
      liveBtn.classList.add("show");
    }
  }

  function connect() {
    setStatus("", "Connecting…");
    ws = new WebSocket("wss://" + WORKER_HOST + "/ws?sala=" + encodeURIComponent(sala));

    ws.onopen = () => setStatus("on", "Live");
    ws.onmessage = (e) => addLine(e.data);
    ws.onclose = () => {
      setStatus("off", "Reconnecting…");
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => { try { ws.close(); } catch {} };
  }
</script>
</body>
</html>
