<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atos2 · Live Translation</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230f0f17'/%3E%3Ctext%20x='16'%20y='24'%20font-family='Georgia,serif'%20font-weight='600'%20font-size='22'%20fill='%23e8c97a'%20text-anchor='middle'%3E2%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --text: #f0ead6;
    --muted: #7a7565;
    --red: #c0392b;
    --green: #4caf75;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem;
    background: rgba(10,10,15,0.96);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
    z-index: 10;
  }
  #room-label { color: var(--muted); font-size: 0.6rem; }
  .topbar-left { display: flex; flex-direction: column; gap: 1px; line-height: 1.05; }
  .brand-mark { font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.06em; color: var(--gold); text-transform: none; }
  .brand-mark b { color: var(--gold2); font-weight: 500; }
  #status { display: flex; align-items: center; gap: 0.45rem; color: var(--muted); }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  #dot.on { background: var(--green); box-shadow: 0 0 8px rgba(76,175,117,0.6); }
  #dot.off { background: var(--red); }

  #feed {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 1.6rem 1.2rem 2rem;
  }
  .line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    font-weight: 400;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 1.1rem;
    padding-left: 0.85rem;
    border-left: 2px solid rgba(201,168,76,0.35);
    animation: fade 0.4s ease-out;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .placeholder {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--muted);
    text-align: center;
    margin-top: 30vh;
    padding: 0 1.5rem;
  }
  #live-btn {
    position: fixed;
    bottom: 1.4rem; left: 50%;
    transform: translateX(-50%) translateY(2rem);
    background: linear-gradient(135deg, #b8943a, #dbb96a);
    color: #0a0a0f;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em;
    padding: 0.6rem 1.4rem;
    border: none; border-radius: 30px;
    box-shadow: 0 4px 22px rgba(0,0,0,0.55);
    cursor: pointer;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 20;
  }
  #live-btn.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

  #listen-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.32rem 0.7rem; border-radius: 20px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  #listen-btn.on { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold2); }
</style>
</head>
<body>
  <div id="topbar">
    <span class="topbar-left">
      <span class="brand-mark"><b>Atos</b>2</span>
      <span id="room-label">—</span>
    </span>
    <button id="listen-btn">🔊 Listen</button>
    <span id="status"><span id="dot"></span><span id="status-text">Connecting…</span></span>
  </div>

  <div id="feed">
    <div class="placeholder" id="placeholder">Waiting for the live translation…</div>
  </div>

  <button id="live-btn">▼ Live</button>

<script>
  const WORKER_HOST = "traducao-culto-broadcast.leandrobisp-s.workers.dev";

  const params = new URLSearchParams(location.search);
  const sala = (params.get("sala") || "").trim().toUpperCase();

  const feed = document.getElementById("feed");
  const liveBtn = document.getElementById("live-btn");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const roomLabel = document.getElementById("room-label");

  let following = true;
  let ws = null;
  let reconnectTimer = null;

  // ── Áudio (Text-to-Speech) — lê a tradução em voz alta no próprio celular ──
  const lang = (params.get("lang") || "en").trim().toLowerCase();
  const BCP47 = {
    en:'en-GB', pt:'pt-BR', es:'es-ES', fr:'fr-FR', de:'de-DE', it:'it-IT',
    ja:'ja-JP', zh:'zh-CN', ko:'ko-KR', ru:'ru-RU', ro:'ro-RO', pl:'pl-PL',
    uk:'uk-UA', nl:'nl-NL', id:'id-ID', vi:'vi-VN', tl:'fil-PH', hi:'hi-IN', tr:'tr-TR'
  };
  const speechLang = BCP47[lang] || 'en-GB';
  const synth = window.speechSynthesis;
  const listenBtn = document.getElementById("listen-btn");
  let speakEnabled = false;

  if (!synth) {
    listenBtn.style.display = "none"; // navegador sem suporte a voz
  } else {
    listenBtn.addEventListener("click", () => {
      speakEnabled = !speakEnabled;
      listenBtn.classList.toggle("on", speakEnabled);
      listenBtn.textContent = speakEnabled ? "🔊 On" : "🔊 Listen";
      try {
        synth.cancel();
        if (speakEnabled) {
          // desbloqueia o áudio (necessário no iOS) usando o toque do usuário
          const u = new SpeechSynthesisUtterance(" ");
          u.lang = speechLang;
          synth.speak(u);
        }
      } catch (e) {}
    });
  }

  function speak(text) {
    if (!speakEnabled || !synth || !text) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = speechLang;
      u.rate = 1.0;
      synth.speak(u);
    } catch (e) {}
  }

  roomLabel.textContent = sala ? ("Room " + sala) : "No room";

  if (!sala) {
    document.getElementById("placeholder").textContent = "Invalid link: no room found.";
    statusText.textContent = "No room";
  } else {
    connect();
  }

  function setStatus(state, text) {
    dot.className = state;
    statusText.textContent = text;
  }

  function atBottom() {
    return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  }
  function scrollToBottom(smooth) {
    feed.scrollTo({ top: feed.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  }

  // Detecta se a pessoa rolou para cima (para parar de empurrar) ou voltou ao fim (para retomar).
  feed.addEventListener("scroll", () => {
    if (atBottom()) {
      following = true;
      liveBtn.classList.remove("show");
    } else {
      following = false;
      liveBtn.classList.add("show");
    }
  });

  liveBtn.addEventListener("click", () => {
    following = true;
    liveBtn.classList.remove("show");
    scrollToBottom(true);
  });

  function addLine(text) {
    if (!text) return;
    const ph = document.getElementById("placeholder");
    if (ph) ph.remove();

    const div = document.createElement("div");
    div.className = "line";
    div.textContent = text;
    feed.appendChild(div);

    speak(text);

    // Só acompanha automaticamente se a pessoa estiver lendo ao vivo (no fim).
    if (following) {
      scrollToBottom(false);
    } else {
      liveBtn.classList.add("show");
    }
  }

  function connect() {
    setStatus("", "Connecting…");
    ws = new WebSocket("wss://" + WORKER_HOST + "/ws?sala=" + encodeURIComponent(sala));

    ws.onopen = () => setStatus("on", "Live");
    ws.onmessage = (e) => addLine(e.data);
    ws.onclose = () => {
      setStatus("off", "Reconnecting…");
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => { try { ws.close(); } catch {} };
  }
</script>
</body>
</html>
